<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Lists</title>
    </head>

    <body>
        <h1>Unordered Lists</h1>
        <ul>
            <li>Item 1</li>
            <li><strong>Item 2</strong></li>
            <li><em>Item 3</em></li>
            <li>Item 4</li>
        </ul>

        <br>

        <h1>Ordered List</h1>
        <ol>
            <li><h3>Item 1</h3></li>
            <li><em>Item 2</em></li>
            <li><em>Item 3</em></li>
            <li>Item 4</li>
        </ol>
    </body>
</html>
